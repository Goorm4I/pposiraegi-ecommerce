name: Deploy All (Infrastructure & Apps)

on:
  workflow_dispatch:
    inputs:
      skip_bootstrap:
        description: '부트스트랩 스킵 (이미 설치된 경우)'
        type: boolean
        default: true
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: 1.5.0
  EKS_CLUSTER: pposiraegi-cluster

jobs:
  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    outputs:
      s3_bucket: ${{ steps.tf_outputs.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.tf_outputs.outputs.cloudfront_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<TFEOF
          aws_profile           = ""
          region                = "ap-northeast-2"
          project_name          = "pposiraegi"
          vpc_cidr              = "10.0.0.0/16"
          public_subnet_a_cidr  = "10.0.1.0/24"
          public_subnet_b_cidr  = "10.0.2.0/24"
          private_subnet_a_cidr = "10.0.11.0/24"
          private_subnet_b_cidr = "10.0.12.0/24"
          domain_name           = "pposiraegi.cloud"
          db_username           = "pposiraegi"
          db_password           = "${{ secrets.DB_PASSWORD }}"
          jwt_secret            = "${{ secrets.JWT_SECRET }}"
          github_repo           = "Goorm4I/pposiraegi-ecommerce-msa"
          github_branch         = "main"
          codestar_connection_arn = "arn:aws:codeconnections:ap-northeast-2:779846782353:connection/f2153b0a-6274-4ffa-b82c-f90f2cf52c0d"
          TFEOF

      - name: Delete existing EKS Access Entries
        run: |
          aws eks delete-access-entry \
            --cluster-name ${{ env.EKS_CLUSTER }} \
            --principal-arn arn:aws:iam::779846782353:user/jihoon \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Extract Terraform Outputs
        id: tf_outputs
        run: |
          terraform output -json > tf_out.json
          echo "s3_bucket=$(jq -r '.s3_bucket_name.value' tf_out.json)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(jq -r '.cloudfront_id.value' tf_out.json)" >> $GITHUB_OUTPUT

  bootstrap:
    name: Bootstrap Platform
    needs: terraform_apply
    if: ${{ inputs.skip_bootstrap == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Run bootstrap script
        run: |
          chmod +x ./scripts/bootstrap-platform.sh
          ./scripts/bootstrap-platform.sh

  backend_deploy:
    name: Backend Build & Push
    needs: [terraform_apply, bootstrap]
    if: ${{ always() && needs.terraform_apply.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: pposiraegi-${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg MODULE_NAME=${{ matrix.service }} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  frontend_deploy:
    name: Frontend Build & Deploy
    needs: terraform_apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        env:
          REACT_APP_USE_MOCK: "false"
          REACT_APP_API_URL: ""
          REACT_APP_WS_URL: "wss://pposiraegi.cloud/ws/events"
          REACT_APP_ADMIN_EMAILS: "admin@test.com"
          REACT_APP_GRAFANA_URL: "http://grafana.pposiraegi.cloud"
          REACT_APP_PROMETHEUS_URL: ""
          REACT_APP_LOKI_URL: ""
          REACT_APP_TEMPO_URL: ""
        run: pnpm turbo run build --filter=timedeal-front

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync frontend/build s3://${{ needs.terraform_apply.outputs.s3_bucket }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.terraform_apply.outputs.cloudfront_id }} --paths "/*"
