name: Destroy All Infrastructure
on:
  workflow_dispatch:
env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: 1.5.0
jobs:
  terraform_destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          aws_profile           = ""
          region                = "ap-northeast-2"
          project_name          = "pposiraegi"
          vpc_cidr              = "10.0.0.0/16"
          public_subnet_a_cidr  = "10.0.1.0/24"
          public_subnet_b_cidr  = "10.0.2.0/24"
          private_subnet_a_cidr = "10.0.11.0/24"
          private_subnet_b_cidr = "10.0.12.0/24"
          domain_name           = "pposiraegi.cloud"
          db_username           = "pposiraegi"
          db_password           = "${{ secrets.DB_PASSWORD }}"
          jwt_secret            = "${{ secrets.JWT_SECRET }}"
          github_repo           = "Goorm4I/pposiraegi-ecommerce-msa"
          github_branch         = "main"
          codestar_connection_arn = "arn:aws:codeconnections:ap-northeast-2:779846782353:connection/f2153b0a-6274-4ffa-b82c-f90f2cf52c0d"
          EOF

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -lock=false
