spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

logging:
  level:
    cloud.pposiraegi.ecommerce: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: "iqe7Fa7xrhXwJ5SLoee88Yg7DeUuJflj4+IE/XIl81tmZ24qNd4tCUble1Zk2drO="
  access-token-validity-in-milliseconds: 3600000
  refresh-token-validity-in-milliseconds: 86400000

storage:
  location: /app/uploads/