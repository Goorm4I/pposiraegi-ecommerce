apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # EKS Optimized AMI 자동 탐지
  amiSelectorTerms:
    - alias: al2023@latest

  # Terraform이 생성한 노드 IAM Role 사용
  role: "pposiraegi-eks-node-role"

  # Karpenter discovery 태그로 서브넷 자동 탐지
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "pposiraegi-eks"

  # Karpenter discovery 태그로 SG 자동 탐지
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "pposiraegi-eks"

  # EBS 루트 볼륨 설정
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  tags:
    Environment: dev
    ManagedBy: karpenter
