apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer  # 노드 확정 후 볼륨 프로비저닝 (Karpenter 호환)
reclaimPolicy: Delete
parameters:
  type: gp3
  encrypted: "true"
