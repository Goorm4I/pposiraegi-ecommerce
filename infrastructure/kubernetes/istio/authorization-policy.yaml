## /actuator/prometheus 보안: Prometheus SA 외 접근 선차단 (L7 — waypoint 필요)
## Istio AuthorizationPolicy는 DENY가 ALLOW보다 우선한다.
## 따라서 아래의 넓은 internal allow가 있어도 metrics 경로는 Prometheus만 접근 가능하다.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-prometheus-non-prometheus
  namespace: production
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: waypoint
  action: DENY
  rules:
  - from:
    - source:
        notPrincipals:
        - "cluster.local/ns/monitoring/sa/kube-prometheus-stack-prometheus"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/actuator/prometheus"]
---
## /actuator/prometheus 보안: Prometheus SA만 접근 허용 (L7 — waypoint 필요)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: production
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: waypoint
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/monitoring/sa/kube-prometheus-stack-prometheus"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/actuator/prometheus"]
---
## 서비스 간 내부 트래픽: production + api-gateway SA 허용
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-internal-traffic
  namespace: production
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: waypoint
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["production"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/production/sa/api-gateway"
---
## Health check: ALB/kubelet → /actuator/health 허용 (L7)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-health-check
  namespace: production
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: waypoint
  action: ALLOW
  rules:
  - to:
    - operation:
        methods: ["GET"]
        paths: ["/actuator/health", "/actuator/health/liveness", "/actuator/health/readiness"]
---
## 기본 deny-all (위 ALLOW에 매칭 안 되면 차단)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: production
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: waypoint
