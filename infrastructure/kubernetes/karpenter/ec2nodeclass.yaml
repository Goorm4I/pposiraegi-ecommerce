apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: "pposiraegi-eks-node-role"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "pposiraegi-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "pposiraegi-cluster"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  tags:
    Environment: production
    ManagedBy: karpenter
