## Loki (로그 수집) Helm values — Simple Scalable mode
## helm repo add grafana https://grafana.github.io/helm-charts
## helm upgrade --install loki grafana/loki \
##   -n monitoring -f loki-values.yaml

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1  # 단일 AZ 실습환경, 프로덕션은 3 권장
  storage:
    type: s3
    # Loki chart v6.x: bucketNames 필드 필수
    bucketNames:
      chunks: pposiraegi-loki-logs
      ruler: pposiraegi-loki-logs
      admin: pposiraegi-loki-logs
    s3:
      region: ap-northeast-2
      s3ForcePathStyle: false
  schemaConfig:
    configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

# Promtail (각 노드에서 Pod 로그 수집)
promtail:
  enabled: true
  config:
    clients:
    - url: http://loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
      - docker: {}
      # Spring Boot JSON 로그 파싱
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            trace_id: mdc.traceId
      - labels:
          level:
          logger:
      - output:
          source: message
    scrapeConfigs:
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        action: keep
        regex: production|monitoring
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

# S3 접근용 IRSA (Terraform에서 role 생성 후 annotation 추가)
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/pposiraegi-loki-role"

# 실습용 .large NodePool 기준: Loki 기본 memcached chunks-cache는 약 10Gi 메모리를 요구한다.
# 비용 최적화 노드 정책과 충돌하므로 캐시 계층은 끄고, S3 + 단일 replica 구성부터 안정화한다.
chunksCache:
  enabled: false

resultsCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

gateway:
  nginxConfig:
    # 기본값은 kube-dns FQDN인데 nginx 시작 시점 DNS 조회 실패로 CrashLoop가 발생할 수 있다.
    # EKS 기본 Service CIDR 기준 kube-dns ClusterIP를 직접 사용한다.
    resolver: "172.20.0.10"

write:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: gp3

read:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: gp3

backend:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: gp3
